services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: kb
      POSTGRES_PASSWORD: kb_dev_password
      POSTGRES_DB: kb_document
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
