# Add this server block to the nginx instance that already listens on port 80
# (bookly stack). Reload nginx after copying.
#
# Example (bookly nginx container):
#   docker cp deploy/nginx/host-kb.bookly.lv.conf <bookly-nginx>:/etc/nginx/conf.d/kb.bookly.lv.conf
#   docker exec <bookly-nginx> nginx -s reload

server {
    listen 80;
    server_name kb.bookly.lv;

    client_max_body_size 100m;

    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
